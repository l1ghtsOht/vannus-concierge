<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vannus Concierge — Request Received</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070710;
  --text: #ececf4;
  --text-dim: rgba(255,255,255,0.55);
  --accent: #7B6FF0;
  --accent2: #5B8DF0;
  --green: #34d399;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 24px;
}
.check {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(52,211,153,0.08);
  border: 2px solid var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 32px;
  animation: pop 0.5s ease-out;
}
@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 40px;
  margin-bottom: 16px;
}
p {
  color: var(--text-dim);
  font-size: 17px;
  max-width: 480px;
  line-height: 1.8;
  margin-bottom: 40px;
}
a {
  display: inline-block;
  padding: 14px 36px;
  border: 1px solid rgba(120,100,255,0.25);
  border-radius: 10px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.3s;
}
a:hover {
  background: rgba(120,100,255,0.1);
  transform: translateY(-1px);
}
</style>
</head>
<body>
<div class="check">&#10003;</div>
<h1>Request Received</h1>
<p>We've got your information. A Vannus founder will review your submission and reach out within 24 hours. No junior handoffs &mdash; you'll hear directly from us.</p>
<a href="https://vannus.co">Back to Vannus</a>
</body>
</html>
